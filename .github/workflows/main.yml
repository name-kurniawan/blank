name: SSH
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v1
     - name: Start SSH via Ngrok
       if: ${{ failure() }}
       run: RUN apt-get update && sudo useradd -m shamy && sudo adduser shamy sudo && echo "shamy:123" | sudo chpasswd && sed -i 's/\/bin\/sh/\/bin\/bash/g' /etc/passwd && sudo hostname blank && wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz && unzip -o ngrok-v3-stable-linux-amd64.tgz && chmod +x ./ngrok && echo -e "123\n123" | sudo passwd "shamy" && ./ngrok config add-authtoken 2CcNEs5ZUr0Xn8un5XOmfzKvCuT_4Gt5EdyewWdY4gaMpcXWS && ./ngrok tcp 22 &&
     - name: ping guugel
       run: ping google.com
     - name: Don't kill instace
       if: ${{ failure() }}
       run: sleep 6h
